<div class="login-page">
  <div class="lang-selector-container">
    <select [value]="translate.currentLang()" (change)="translate.loadLanguage($any($event.target).value)" class="lang-select">
      @for (lang of translate.languages(); track lang.code) {
        <option [value]="lang.code">{{ lang.name }}</option>
      }
    </select>
  </div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#1a56db"/>
          <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>JobApply<span class="brand-de">.de</span></h1>
    </div>
    <p class="tagline">{{ translate.t().login.tagline }}</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="field">
        <label for="email">{{ translate.t().login.emailLabel }}</label>
        <input
          id="email"
          type="email"
          [placeholder]="translate.t().login.emailPlaceholder"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
        />
      </div>
      <div class="field">
        <label for="password">{{ translate.t().login.passwordLabel }}</label>
        <input
          id="password"
          type="password"
          [placeholder]="translate.t().login.passwordPlaceholder"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> {{ translate.t().login.signingIn }}
        } @else {
          {{ translate.t().login.signInBtn }}
        }
      </button>
    </form>

    <p class="hint">{{ translate.t().login.demoHint }}</p>
  </div>
</div>
