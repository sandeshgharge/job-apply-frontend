<div class="login-page">
  <div class="lang-selector-container">
    <select [value]="translate.currentLang()" (change)="translate.loadLanguage($any($event.target).value)" class="lang-select">
      @for (lang of translate.languages(); track lang.code) {
        <option [value]="lang.code" [selected]="translate.currentLang() === lang.code">{{ lang.name }}</option>
      }
    </select>
  </div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <app-name-logo />
      </div>
    </div>
    <p class="tagline">{{ translate.t().login.tagline }}</p>

    <form [formGroup]="loginFormGroup" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="email">{{ translate.t().login.emailLabel }}</label>
        <input
          id="email"
          type="email"
          [placeholder]="translate.t().login.emailPlaceholder"
          [formControl]="email"
          name="email"
          required
        />
      </div>
      <div class="field">
        <label for="password">{{ translate.t().login.passwordLabel }}</label>
        <input
          id="password"
          type="password"
          [placeholder]="translate.t().login.passwordPlaceholder"
          [formControl]="password"
          name="password"
          required
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      @if (password.errors) {
        @if (password.errors['minlength']) {
          <div class="error-msg">{{ translate.t().login.passwordPlaceholder }}</div>
        }
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> {{ translate.t().login.signingIn }}
        } @else {
          {{ translate.t().login.signInBtn }}
        }
      </button>
    </form>

    <!--<p class="hint">{{ translate.t().login.demoHint }}</p>-->
  </div>
</div>
