<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#1a56db"/>
          <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>JobApply<span class="brand-de">.de</span></h1>
    </div>
    <p class="tagline">Your German job search, organised.</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          type="email"
          placeholder="you@example.com"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Min. 6 characters"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
        />
      </div>

      @if (error()) {
        <div class="error-msg">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span> Signing in…
        } @else {
          Sign in
        }
      </button>
    </form>

    <p class="hint">Demo: use any email + 6+ char password</p>
  </div>
</div>
