<div class="wizard-page">

  <!-- Step indicator -->
  <nav class="tab-nav">
      @for (tab of tabs(); track tab.id) {
        <button
          class="tab-btn"
          [class.active]="activeTab() === tab.id"
          (click)="setTab(tab.id)"
          [attr.data-tour]="tab.id === 'Cover Letter' ? 'tour-wizard-tab-cl' : tab.id === 'CV' ? 'tour-wizard-tab-cv' : tab.id === 'PDF Preview' ? 'tour-wizard-tab-preview' : null"
        >
          <span class="tab-icon">{{ tab.icon }}</span>
          {{ tab.label }}
        </button>
      }
    </nav>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- STEP 1 — Fetch Job Details                        -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="step-panel" [class.d-none]="activeTab() !== 'Fetch Job'">
      <div class="step-header">
        <h2>{{ translate.t().applyWizard.titleFetch }}</h2>
        <p class="subtitle">{{ translate.t().applyWizard.subtitleFetch }}</p>
      </div>

      <div class="url-row">
        <input class="url-input" type="url" [placeholder]="translate.t().applyWizard.placeholderUrl"
          [ngModel]="jobUrl()" (ngModelChange)="updateJobUrl($event)"
          (keydown.enter)="fetchJob()"
          data-tour="tour-url-input" />
        <button class="btn-fetch" (click)="fetchJob()" [disabled]="fetchLoading() || !jobUrl().trim()">
          @if (fetchLoading()) { <span class="spinner"></span> {{ translate.t().applyWizard.loading }} }
          @else { {{ translate.t().applyWizard.btnFetch }} }
        </button>
      </div>

      @if (parseLoading()) {
        <div class="parse-notice">
          <span class="spinner-sm-blue"></span> {{ translate.t().applyWizard.noticeExtracting }}
        </div>
      }

      <div class="field mt">
        <label>{{ translate.t().applyWizard.labelDescription }}</label>
        <textarea class="jd-textarea" rows="18"
          [placeholder]="translate.t().applyWizard.placeholderDescription"
          [ngModel]="jobDescription()" (ngModelChange)="updateJobDescription($event)"
          data-tour="tour-jd-textarea"></textarea>
      </div>

      <div class="step-footer">
        <span class="char-count">{{ jobDescription().length }} {{ translate.t().applyWizard.characters }}</span>
        <button class="btn-next" (click)="extractDataForCoverLetter()" [disabled]="parseLoading() || !jobDescription().trim()" data-tour="tour-extract-btn">
          @if (parseLoading()) { <span class="spinner"></span> {{ translate.t().applyWizard.noticeProgress }} }
          @else { {{ translate.t().applyWizard.btnExtractDetails }} }
        </button>
      </div>
    </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- STEP 2 — Cover Letter                             -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="step-panel" [class.d-none]="activeTab() !== 'Cover Letter'">
      <app-cover-letter #coverLetter/>

      <div class="step-footer apply-footer">
        <button class="btn-back" (click)="setTab('Fetch Job')">{{ translate.t().applyWizard.btnBack }}</button>
        <div class="footer-right">
          <button class="btn-next" (click)="setTab('CV')">
            {{ translate.t().applyWizard.btnNextCv }}
          </button>
        </div>
      </div>
    </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- STEP 3 — CV Builder                               -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="step-panel" [class.d-none]="activeTab() !== 'CV'">
      <app-cv-builder #cvBuilder [prefillSkills]="skillGroups()" />
      <div class="step-footer apply-footer">
        <button class="btn-back" (click)="setTab('Cover Letter')">{{ translate.t().applyWizard.btnBack }}</button>
        <div class="footer-right">
          <button class="btn-next" (click)="setTab('PDF Preview')">
            {{ translate.t().applyWizard.btnNextPreview }}
          </button>
        </div>
      </div>
    </div>

  <!-- ══════════════════════════════════════════════════ -->
  <!-- STEP 4 — Apply Summary                            -->
  <!-- ══════════════════════════════════════════════════ -->
  <div class="step-panel" [class.d-none]="activeTab() !== 'PDF Preview'">
      <app-pdf-preview />
      <div class="step-footer apply-footer">
        <button class="btn-back" (click)="setTab('CV')">{{ translate.t().applyWizard.btnBack }}</button>
        <div class="footer-right">
          <button class="btn-mark-applied" (click)="markAsApplied()" [disabled]="applyLoading()" data-tour="tour-mark-applied-btn">
            @if (applyLoading()) { <span class="spinner"></span> {{ translate.t().applyWizard.loadingApplyJob }} }
            @else { {{ translate.t().applyPreview.btnMarkApplied }} }
          </button>
        </div>
      </div>
    </div>

</div>
