<div class="profile-card">
  <div class="card-header">
    <h2>Profile Information</h2>
  </div>
  <div class="form-group">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" name="firstName" [(ngModel)]="profile.firstName" placeholder="Enter first name" />
  </div>
  <div class="form-group">
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" [(ngModel)]="profile.lastName" placeholder="Enter last name" />
  </div>
  <div class="form-group">
    <label for="email">Email Id</label>
    <input type="email" id="email" name="email" [(ngModel)]="profile.email" placeholder="Enter email address" />
  </div>
  <div class="form-group">
    <label for="apiUrl">Agent API URL</label>
    <input type="url" id="apiUrl" name="apiUrl" [(ngModel)]="profile.apiUrl" placeholder="https://api.example.com" />
  </div>
  <div class="form-group">
    <label for="apiKey">Agent API Key</label>
    <input type="text" id="apiKey" name="apiKey" [(ngModel)]="profile.apiKey" placeholder="Enter API key" />
  </div>
  <button class="save-button" type="button" (click)="saveChanges()">Save Changes</button>
</div>
