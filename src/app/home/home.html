<div class="app-shell">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="#1a56db"/>
          <path d="M7 14h14M14 7v14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span>JobApply<b>.de</b></span>
      </div>
    </div>

    <nav class="tab-nav">
      @for (tab of tabs; track tab.id) {
        <button class="tab-btn" [class.active]="activeTab() === tab.id" (click)="setTab(tab.id)">
          <span class="tab-icon">{{ tab.icon }}</span>
          {{ tab.label }}
        </button>
      }
    </nav>

    <div class="topbar-right">
      <button class="theme-btn" (click)="themeService.toggleTheme()" aria-label="Toggle theme">
        @if (themeService.theme() === 'light') {
          <span class="theme-icon">🌙</span>
        } @else {
          <span class="theme-icon">☀️</span>
        }
      </button>
      <span class="user-name">{{ user?.name }}</span>
      <button class="logout-btn" (click)="logout()">Sign out</button>
    </div>
  </header>

  <main class="content">
    @if (activeTab() === 'dashboard')   { <app-dashboard /> }
    @if (activeTab() === 'apply-job')   { <app-apply-job /> }
    @if (activeTab() === 'job-tracker') { <app-job-tracker /> }
    @if (activeTab() === 'profile')     { <app-profile-info /> }
  </main>

  <app-toast />
  <app-status-bar />
</div>
